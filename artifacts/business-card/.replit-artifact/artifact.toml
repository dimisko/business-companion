kind = "web"
previewPath = "/"
title = "Dime Mishkov — Digital Business Card"
version = "1.0.0"
id = "artifacts/business-card"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22572

[services.development]
run = "pnpm --filter @workspace/business-card run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/business-card", "run", "build" ]
publicDir = "artifacts/business-card/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22572"
BASE_PATH = "/"
